<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>koukou app - AI 智能抠图 Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0A0F;
  --surface: #12121A;
  --card: #1A1A24;
  --accent: #FF6B6B;
  --accent-hover: #E55A5A;
  --white: #FFFFFF;
  --text: #EFEFF5;
  --sub: #808094;
  --border: #26262E;
  --tag-before-bg: #777777;
  --footer-bg: #1F1F2E;
  --footer-text: #B2B2BF;
  --margin: 120px;
  --header-h: 72px;
  --radius: 20px;
  --radius-sm: 14px;
  --radius-xs: 6px;
  --transition: 0.2s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

.ambient-glow {
  position: fixed;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  width: 900px;
  height: 450px;
  border-radius: 50%;
  background: radial-gradient(ellipse 50% 50% at 50% 0%,
    rgba(255,107,107,0.12) 0%,
    rgba(10,10,15,0) 100%);
  pointer-events: none;
  z-index: 0;
}

.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: rgba(10,10,15,0.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  display: flex;
  align-items: center;
  padding: 0 var(--margin);
  z-index: 100;
  border-bottom: 1px solid transparent;
}

.logo {
  font-size: 22px;
  font-weight: 700;
  color: var(--white);
  letter-spacing: -0.3px;
}

.logo span { color: var(--accent); }

.nav {
  display: flex;
  gap: 40px;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}

.nav a {
  font-size: 14px;
  font-weight: 500;
  color: var(--sub);
  text-decoration: none;
  transition: color var(--transition);
}

.nav a:hover { color: var(--white); }

.header-cta {
  margin-left: auto;
  background: var(--accent);
  color: var(--white);
  font-size: 13px;
  font-weight: 600;
  padding: 10px 24px;
  border-radius: 19px;
  border: none;
  cursor: pointer;
  transition: background var(--transition);
}

.header-cta:hover { background: var(--accent-hover); }

.main {
  max-width: 1440px;
  margin: 0 auto;
  padding-top: var(--header-h);
  position: relative;
  z-index: 1;
  min-height: 100vh;
}

.hero {
  padding: 96px var(--margin) 0;
}

.hero h1 {
  font-size: 64px;
  font-weight: 800;
  line-height: 1.125;
  color: var(--white);
  letter-spacing: -1.5px;
}

.hero h2 {
  font-size: 56px;
  font-weight: 800;
  line-height: 1.143;
  color: var(--sub);
  margin-top: 8px;
  letter-spacing: -1.2px;
}

.hero p {
  font-size: 17px;
  color: var(--sub);
  margin-top: 24px;
  line-height: 1.5;
}

.content-row {
  display: flex;
  gap: 60px;
  padding: 65px var(--margin) 0;
  align-items: flex-start;
}

.upload-card {
  width: 460px;
  min-width: 460px;
  height: 353px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 0 0;
  position: relative;
  transition: border-color var(--transition), box-shadow var(--transition);
}

.upload-card.drag-over {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(255,107,107,0.15);
}

.upload-icon-circle {
  width: 56px; height: 56px;
  border-radius: 50%;
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.upload-icon-circle svg {
  width: 24px; height: 24px;
  stroke: white;
}

.upload-text {
  font-size: 16px;
  font-weight: 500;
  color: var(--white);
  margin-top: 24px;
}

.upload-hint {
  font-size: 13px;
  color: var(--sub);
  margin-top: 10px;
}

.upload-btn {
  margin-top: 28px;
  width: 180px;
  height: 48px;
  border-radius: 24px;
  background: var(--accent);
  color: var(--white);
  font-size: 15px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: background var(--transition), transform var(--transition);
  font-family: inherit;
}

.upload-btn:hover {
  background: var(--accent-hover);
  transform: translateY(-1px);
}

.upload-btn:active { transform: translateY(0); }

.upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.upload-time {
  font-size: 12px;
  color: var(--sub);
  margin-top: 18px;
}

.hidden-input { display: none; }

/* API Key row */
.api-key-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-top: 22px;
  width: 100%;
  padding: 0 20px;
}

.api-key-row input {
  flex: 1;
  height: 36px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 0 12px;
  font-size: 12px;
  font-family: inherit;
  outline: none;
  transition: border-color var(--transition);
}

.api-key-row input:focus { border-color: var(--accent); }

.api-key-row input::placeholder { color: var(--sub); opacity: 0.6; }

.api-badge {
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  white-space: nowrap;
  cursor: pointer;
  text-decoration: underline;
}

/* Preview Card */
.preview-card {
  flex: 1;
  height: 353px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 17px 40px 0 24px;
  display: flex;
  flex-direction: column;
}

.preview-label {
  font-size: 16px;
  font-weight: 700;
  color: var(--sub);
  letter-spacing: 2px;
  margin-left: 12px;
  margin-bottom: 10px;
}

.preview-images {
  display: flex;
  align-items: center;
}

.image-box {
  width: 292px;
  height: 240px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

.image-box img {
  width: 100%;
  height: 100%;
  object-fit: contain;
}

.image-tag {
  position: absolute;
  top: 10px;
  left: 12px;
  height: 24px;
  padding: 0 8px;
  border-radius: var(--radius-xs);
  font-size: 10px;
  font-weight: 600;
  color: var(--white);
  display: flex;
  align-items: center;
  z-index: 2;
}

.image-tag.before { background: var(--tag-before-bg); }
.image-tag.after  { background: var(--accent); }

.image-placeholder {
  font-size: 44px;
  opacity: 0.25;
  color: var(--sub);
  user-select: none;
}

.preview-arrow {
  font-size: 16px;
  color: var(--accent);
  font-weight: 700;
  flex-shrink: 0;
  margin: 0 8px;
}

.download-btn {
  width: 140px;
  height: 42px;
  border-radius: 21px;
  background: var(--accent);
  color: var(--white);
  font-size: 14px;
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: background var(--transition);
  font-family: inherit;
  margin-left: 400px;
  margin-top: 11px;
  margin-bottom: auto;
}

.download-btn:hover { background: var(--accent-hover); }
.download-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.processing-indicator {
  display: none;
  position: absolute;
  inset: 0;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  color: var(--sub);
  font-size: 13px;
  z-index: 5;
  background: rgba(18,18,26,0.85);
  border-radius: var(--radius-sm);
}

.processing .processing-indicator { display: flex; }
.processing img { filter: brightness(0.5); }

.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.footer {
  max-width: 1440px;
  margin: 132px auto 0;
  height: 72px;
  background: var(--footer-bg);
  border-top: 1px solid rgba(38,38,46,0.5);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 var(--margin);
}

.footer-copy {
  font-size: 14px;
  color: var(--footer-text);
}

.footer-links {
  font-size: 14px;
  color: var(--footer-text);
  display: flex;
  gap: 8px;
}

.footer-links a {
  color: var(--footer-text);
  text-decoration: none;
  transition: color var(--transition);
}

.badge {
  display: inline-block;
  padding: 3px 10px;
  background: var(--accent);
  color: white;
  font-size: 11px;
  font-weight: 700;
  border-radius: 10px;
  margin-left: 8px;
  vertical-align: middle;
}

/* Responsive */
@media (max-width: 1280px) {
  :root { --margin: 60px; }
  .hero h1 { font-size: 48px; }
  .hero h2 { font-size: 40px; }
  .content-row { flex-direction: column; align-items: center; }
  .upload-card { width: 100%; min-width: unset; max-width: 500px; }
  .preview-card { width: 100%; max-width: 700px; padding: 17px 24px 0 24px; }
  .preview-images { flex-wrap: wrap; justify-content: center; }
  .image-box { width: 45%; min-width: 200px; }
  .nav { display: none; }
  .header { padding: 0 24px; }
  .header-cta { padding: 8px 18px; font-size: 12px; }
}

@media (max-width: 768px) {
  :root { --margin: 20px; --header-h: 60px; --radius: 16px; --radius-sm: 12px; }
  .ambient-glow { width: 100vw; height: 280px; opacity: 0.6; }
  .header { padding: 0 16px; height: var(--header-h); }
  .logo { font-size: 18px; }
  .header-cta { padding: 8px 16px; font-size: 12px; border-radius: 16px; }
  .hero { padding: 60px var(--margin) 0; }
  .hero h1 { font-size: 30px; letter-spacing: -0.8px; }
  .hero h2 { font-size: 24px; letter-spacing: -0.5px; }
  .hero p { font-size: 14px; margin-top: 16px; }
  .content-row { padding: 32px var(--margin) 0; gap: 24px; }
  .upload-card { height: auto; padding: 36px 20px 28px; width: 100%; max-width: 100%; }
  .upload-icon-circle { width: 48px; height: 48px; }
  .upload-icon-circle svg { width: 20px; height: 20px; }
  .upload-text { font-size: 15px; margin-top: 20px; }
  .upload-hint { font-size: 12px; margin-top: 8px; }
  .upload-btn { width: 100%; max-width: 260px; height: 46px; font-size: 15px; margin-top: 22px; border-radius: 23px; }
  .upload-time { font-size: 11px; margin-top: 14px; }
  .preview-card { height: auto; padding: 20px 16px; width: 100%; max-width: 100%; }
  .preview-label { font-size: 14px; letter-spacing: 1.5px; margin-left: 4px; margin-bottom: 8px; }
  .preview-images { flex-direction: column; gap: 10px; align-items: center; }
  .image-box { width: 100%; max-width: 360px; height: 200px; }
  .preview-arrow { transform: rotate(90deg); margin: 2px 0; font-size: 18px; }
  .download-btn { width: 100%; max-width: 200px; height: 44px; margin: 20px auto 0; }
  .api-key-row { flex-direction: column; gap: 6px; }
  .api-key-row input { width: 100%; }
  .footer { flex-direction: column; gap: 10px; justify-content: center; height: auto; padding: 20px var(--margin); margin-top: 60px; }
  .footer-copy { font-size: 12px; text-align: center; }
  .footer-links { font-size: 12px; gap: 12px; flex-wrap: wrap; justify-content: center; }
}

@media (max-width: 400px) {
  :root { --margin: 16px; --header-h: 54px; --radius: 14px; --radius-sm: 10px; }
  .ambient-glow { height: 200px; opacity: 0.4; }
  .hero { padding: 50px var(--margin) 0; }
  .hero h1 { font-size: 26px; }
  .hero h2 { font-size: 21px; }
  .hero p { font-size: 13px; }
  .content-row { padding-top: 24px; gap: 18px; }
  .upload-card { padding: 28px 16px 24px; }
  .upload-icon-circle { width: 42px; height: 42px; }
  .upload-btn { height: 44px; font-size: 14px; max-width: 100%; }
  .image-box { height: 160px; }
  .preview-card { padding: 16px 12px; }
  .download-btn { height: 42px; font-size: 14px; max-width: 100%; }
  .footer { padding: 16px var(--margin); margin-top: 40px; }
  .footer-links { font-size: 11px; gap: 8px; }
}

@media (hover: none) and (pointer: coarse) {
  .upload-btn, .download-btn, .header-cta { min-height: 44px; }
}
</style>
</head>
<body>

<div class="ambient-glow"></div>

<header class="header">
  <div class="logo">koukou app <span>Pro</span></div>
  <nav class="nav">
    <a href="#">首页</a>
    <a href="#">功能</a>
    <a href="#">价格</a>
    <a href="#">常见问题</a>
  </nav>
  <button class="header-cta">免费试用</button>
</header>

<main class="main">
  <section class="hero">
    <h1>一键去除背景 <span class="badge">API</span></h1>
    <h2>云端 AI 引擎，精准识别主体</h2>
    <p>调用 remove.bg 云端 API，智能区分白色物体与白色背景，边缘更精准。</p>
  </section>

  <div class="content-row">
    <div class="upload-card" id="uploadCard">
      <div class="upload-icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </div>
      <div class="upload-text">拖拽图片到此处，或点击上传</div>
      <div class="upload-hint">支持 PNG / JPG / WebP，最大 10MB</div>
      <button class="upload-btn" id="uploadBtn">选择图片</button>
      <div class="api-key-row">
        <input type="password" id="apiKeyInput" placeholder="输入 remove.bg API Key（免费 50张/月）">
        <span class="api-badge" id="getKeyBtn">获取 Key</span>
      </div>
      <input type="file" accept="image/png,image/jpeg,image/webp" class="hidden-input" id="fileInput">
    </div>

    <div class="preview-card" id="previewCard">
      <div class="preview-label">预览</div>
      <div class="preview-images">
        <div class="image-box" id="beforeBox">
          <span class="image-tag before">处理前</span>
          <span class="image-placeholder">🖼</span>
          <img id="beforeImg" src="" alt="" style="display:none">
          <div class="processing-indicator">
            <div class="spinner"></div>
            <span>AI 处理中...</span>
          </div>
        </div>
        <span class="preview-arrow">→</span>
        <div class="image-box" id="afterBox">
          <span class="image-tag after">处理后</span>
          <span class="image-placeholder">✨</span>
          <img id="afterImg" src="" alt="" style="display:none">
        </div>
      </div>
      <button class="download-btn" id="downloadBtn" disabled>下载 PNG</button>
    </div>
  </div>

  <footer class="footer">
    <span class="footer-copy">&copy; 2026 AI智能抠图 Pro - 保留所有权利</span>
    <div class="footer-links">
      <a href="#">隐私政策</a> |
      <a href="#">服务条款</a> |
      <a href="#">联系我们</a> |
      <a href="https://www.remove.bg/api" target="_blank" rel="noopener">获取 API Key</a>
    </div>
  </footer>
</main>

<script>
// DOM refs
const uploadCard   = document.getElementById('uploadCard');
const uploadBtn    = document.getElementById('uploadBtn');
const fileInput    = document.getElementById('fileInput');
const beforeBox    = document.getElementById('beforeBox');
const beforeImg    = document.getElementById('beforeImg');
const beforePh     = beforeBox.querySelector('.image-placeholder');
const afterBox     = document.getElementById('afterBox');
const afterImg     = document.getElementById('afterImg');
const afterPh      = afterBox.querySelector('.image-placeholder');
const downloadBtn  = document.getElementById('downloadBtn');
const apiKeyInput  = document.getElementById('apiKeyInput');
const getKeyBtn    = document.getElementById('getKeyBtn');
const statusSpan   = beforeBox.querySelector('.processing-indicator span');

let originalFile = null;
let resultBlob   = null;

// Load saved API key
const savedKey = localStorage.getItem('removebg_key');
if (savedKey) {
  apiKeyInput.value = savedKey;
  apiKeyInput.placeholder = 'API Key 已保存 ✓';
}

// Save key on change
apiKeyInput.addEventListener('change', () => {
  const key = apiKeyInput.value.trim();
  if (key) {
    localStorage.setItem('removebg_key', key);
    apiKeyInput.placeholder = 'API Key 已保存 ✓';
  } else {
    localStorage.removeItem('removebg_key');
  }
});

// Get key link
getKeyBtn.addEventListener('click', () => {
  window.open('https://www.remove.bg/api', '_blank');
});

// Validate file
function handleFile(file) {
  if (!file) return;
  if (!/^image\/(png|jpeg|webp)$/.test(file.type)) {
    alert('请上传 PNG、JPG 或 WebP 格式的图片');
    return;
  }
  if (file.size > 10 * 1024 * 1024) {
    alert('图片大小不能超过 10MB');
    return;
  }

  originalFile = file;

  // Show before
  const url = URL.createObjectURL(file);
  beforeImg.src = url;
  beforeImg.style.display = 'block';
  beforePh.style.display = 'none';

  // Reset after
  afterImg.style.display = 'none';
  afterPh.style.display = 'block';
  downloadBtn.disabled = true;

  removeBg(file);
}

// Call remove.bg API
async function removeBg(file) {
  const apiKey = apiKeyInput.value.trim();
  if (!apiKey) {
    alert('请先输入 remove.bg API Key\n免费注册获取：https://www.remove.bg/api');
    return;
  }

  beforeBox.classList.add('processing');
  statusSpan.textContent = '上传中...';

  try {
    const formData = new FormData();
    formData.append('image_file', file);
    formData.append('size', 'auto');

    const response = await fetch('https://api.remove.bg/v1.0/removebg', {
      method: 'POST',
      headers: { 'X-Api-Key': apiKey },
      body: formData,
    });

    if (!response.ok) {
      const err = await response.json();
      const msgs = {
        'insufficient_credits': 'API 额度已用完（免费 50张/月），请下月再试或升级套餐。',
        'invalid_api_key': 'API Key 无效，请检查后重试。',
        'rate_limit': '请求太频繁，请稍后重试。',
      };
      throw new Error(msgs[err.errors?.[0]?.code] || `API 错误：${err.errors?.[0]?.title || response.status}`);
    }

    statusSpan.textContent = '处理中...';

    resultBlob = await response.blob();
    const url = URL.createObjectURL(resultBlob);
    afterImg.src = url;
    afterImg.style.display = 'block';
    afterPh.style.display = 'none';
    downloadBtn.disabled = false;

    // Save key on success
    localStorage.setItem('removebg_key', apiKey);

  } catch (err) {
    console.error('Remove.bg failed:', err);
    alert('抠图失败：' + err.message);
    afterPh.style.display = 'block';
    afterImg.style.display = 'none';
  } finally {
    beforeBox.classList.remove('processing');
  }
}

// Upload triggers
uploadBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  handleFile(e.target.files[0]);
  fileInput.value = '';
});

// Drag & drop
uploadCard.addEventListener('dragover', (e) => {
  e.preventDefault();
  uploadCard.classList.add('drag-over');
});
uploadCard.addEventListener('dragleave', () => {
  uploadCard.classList.remove('drag-over');
});
uploadCard.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadCard.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});
document.body.addEventListener('dragover', (e) => e.preventDefault());
document.body.addEventListener('drop', (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

// Download
downloadBtn.addEventListener('click', () => {
  if (!resultBlob) return;
  const url = URL.createObjectURL(resultBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (originalFile?.name || 'image').replace(/\.[^.]+$/, '') + '_nobg.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});
</script>
</body>
</html>
