<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>koukou app - AI 智能抠图 RMBG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0A0F;
  --surface: #12121A;
  --card: #1A1A24;
  --accent: #00C896;
  --accent-hover: #00A87D;
  --white: #FFFFFF;
  --text: #EFEFF5;
  --sub: #808094;
  --border: #26262E;
  --tag-before-bg: #777777;
  --footer-bg: #1F1F2E;
  --footer-text: #B2B2BF;
  --margin: 120px;
  --header-h: 72px;
  --radius: 20px;
  --radius-sm: 14px;
  --radius-xs: 6px;
  --transition: 0.2s ease;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

.ambient-glow {
  position: fixed;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  width: 900px;
  height: 450px;
  border-radius: 50%;
  background: radial-gradient(ellipse 50% 50% at 50% 0%,
    rgba(0,200,150,0.12) 0%,
    rgba(10,10,15,0) 100%);
  pointer-events: none;
  z-index: 0;
}

.header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--header-h);
  background: rgba(10,10,15,0.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  display: flex;
  align-items: center;
  padding: 0 var(--margin);
  z-index: 100;
  border-bottom: 1px solid transparent;
}

.logo { font-size: 22px; font-weight: 700; color: var(--white); letter-spacing: -0.3px; }
.logo span { color: var(--accent); }

.nav { display: flex; gap: 40px; position: absolute; left: 50%; transform: translateX(-50%); }
.nav a { font-size: 14px; font-weight: 500; color: var(--sub); text-decoration: none; transition: color var(--transition); }
.nav a:hover { color: var(--white); }

.header-cta {
  margin-left: auto;
  background: var(--accent);
  color: var(--white);
  font-size: 13px;
  font-weight: 600;
  padding: 10px 24px;
  border-radius: 19px;
  border: none;
  cursor: pointer;
  transition: background var(--transition);
}
.header-cta:hover { background: var(--accent-hover); }

.main { max-width: 1440px; margin: 0 auto; padding-top: var(--header-h); position: relative; z-index: 1; min-height: 100vh; }

.hero { padding: 96px var(--margin) 0; }
.hero h1 { font-size: 64px; font-weight: 800; line-height: 1.125; color: var(--white); letter-spacing: -1.5px; }
.hero h2 { font-size: 56px; font-weight: 800; line-height: 1.143; color: var(--sub); margin-top: 8px; letter-spacing: -1.2px; }
.hero p { font-size: 17px; color: var(--sub); margin-top: 24px; line-height: 1.5; }

.content-row { display: flex; gap: 60px; padding: 65px var(--margin) 0; align-items: flex-start; }

.upload-card {
  width: 460px; min-width: 460px; height: 353px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); display: flex; flex-direction: column;
  align-items: center; padding: 48px 0 0; position: relative;
  transition: border-color var(--transition), box-shadow var(--transition);
}
.upload-card.drag-over { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(0,200,150,0.15); }

.upload-icon-circle { width: 56px; height: 56px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.upload-icon-circle svg { width: 24px; height: 24px; stroke: white; }

.upload-text { font-size: 16px; font-weight: 500; color: var(--white); margin-top: 24px; }
.upload-hint { font-size: 13px; color: var(--sub); margin-top: 10px; }

.upload-btn {
  margin-top: 28px; width: 180px; height: 48px; border-radius: 24px;
  background: var(--accent); color: var(--white); font-size: 15px;
  font-weight: 600; border: none; cursor: pointer;
  transition: background var(--transition), transform var(--transition); font-family: inherit;
}
.upload-btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
.upload-btn:active { transform: translateY(0); }
.upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.upload-time { font-size: 12px; color: var(--sub); margin-top: 18px; }
.hidden-input { display: none; }

.preview-card {
  flex: 1; height: 353px; background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 17px 40px 0 24px; display: flex; flex-direction: column;
}
.preview-label { font-size: 16px; font-weight: 700; color: var(--sub); letter-spacing: 2px; margin-left: 12px; margin-bottom: 10px; }
.preview-images { display: flex; align-items: center; }

.image-box {
  width: 292px; height: 240px; border-radius: var(--radius-sm);
  background: var(--surface); display: flex; align-items: center;
  justify-content: center; position: relative; overflow: hidden; flex-shrink: 0;
}
.image-box img { width: 100%; height: 100%; object-fit: contain; }

.image-tag {
  position: absolute; top: 10px; left: 12px; height: 24px; padding: 0 8px;
  border-radius: var(--radius-xs); font-size: 10px; font-weight: 600;
  color: var(--white); display: flex; align-items: center; z-index: 2;
}
.image-tag.before { background: var(--tag-before-bg); }
.image-tag.after { background: var(--accent); }

.image-placeholder { font-size: 44px; opacity: 0.25; color: var(--sub); user-select: none; }

.preview-arrow { font-size: 16px; color: var(--accent); font-weight: 700; flex-shrink: 0; margin: 0 8px; }

.download-btn {
  width: 140px; height: 42px; border-radius: 21px; background: var(--accent);
  color: var(--white); font-size: 14px; font-weight: 600; border: none;
  cursor: pointer; transition: background var(--transition); font-family: inherit;
  margin-left: 400px; margin-top: 11px; margin-bottom: auto;
}
.download-btn:hover { background: var(--accent-hover); }
.download-btn:disabled { opacity: 0.4; cursor: not-allowed; }

.processing-indicator {
  display: none; position: absolute; inset: 0; flex-direction: column;
  align-items: center; justify-content: center; gap: 12px; color: var(--sub);
  font-size: 13px; z-index: 5; background: rgba(18,18,26,0.85); border-radius: var(--radius-sm);
}
.processing .processing-indicator { display: flex; }
.processing img { filter: brightness(0.5); }

.spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.footer {
  max-width: 1440px; margin: 132px auto 0; height: 72px;
  background: var(--footer-bg); border-top: 1px solid rgba(38,38,46,0.5);
  display: flex; align-items: center; justify-content: space-between; padding: 0 var(--margin);
}
.footer-copy { font-size: 14px; color: var(--footer-text); }
.footer-links { font-size: 14px; color: var(--footer-text); display: flex; gap: 8px; }
.footer-links a { color: var(--footer-text); text-decoration: none; transition: color var(--transition); }

.badge {
  display: inline-block; padding: 3px 10px; background: var(--accent);
  color: #0A0A0F; font-size: 11px; font-weight: 700; border-radius: 10px; margin-left: 8px; vertical-align: middle;
}

@media (max-width: 1280px) {
  :root { --margin: 60px; }
  .hero h1 { font-size: 48px; }
  .hero h2 { font-size: 40px; }
  .content-row { flex-direction: column; align-items: center; }
  .upload-card { width: 100%; min-width: unset; max-width: 500px; }
  .preview-card { width: 100%; max-width: 700px; padding: 17px 24px 0 24px; }
  .preview-images { flex-wrap: wrap; justify-content: center; }
  .image-box { width: 45%; min-width: 200px; }
  .nav { display: none; }
  .header { padding: 0 24px; }
  .header-cta { padding: 8px 18px; font-size: 12px; }
}

@media (max-width: 768px) {
  :root { --margin: 20px; --header-h: 60px; --radius: 16px; --radius-sm: 12px; }
  .ambient-glow { width: 100vw; height: 280px; opacity: 0.6; }
  .header { padding: 0 16px; height: var(--header-h); }
  .logo { font-size: 18px; }
  .header-cta { padding: 8px 16px; font-size: 12px; border-radius: 16px; }
  .hero { padding: 60px var(--margin) 0; }
  .hero h1 { font-size: 30px; letter-spacing: -0.8px; }
  .hero h2 { font-size: 24px; letter-spacing: -0.5px; }
  .hero p { font-size: 14px; margin-top: 16px; }
  .content-row { padding: 32px var(--margin) 0; gap: 24px; }
  .upload-card { height: auto; padding: 36px 20px 28px; width: 100%; max-width: 100%; }
  .upload-icon-circle { width: 48px; height: 48px; }
  .upload-icon-circle svg { width: 20px; height: 20px; }
  .upload-text { font-size: 15px; margin-top: 20px; }
  .upload-hint { font-size: 12px; margin-top: 8px; }
  .upload-btn { width: 100%; max-width: 260px; height: 46px; font-size: 15px; margin-top: 22px; border-radius: 23px; }
  .upload-time { font-size: 11px; margin-top: 14px; }
  .preview-card { height: auto; padding: 20px 16px; width: 100%; max-width: 100%; }
  .preview-label { font-size: 14px; letter-spacing: 1.5px; margin-left: 4px; margin-bottom: 8px; }
  .preview-images { flex-direction: column; gap: 10px; align-items: center; }
  .image-box { width: 100%; max-width: 360px; height: 200px; }
  .preview-arrow { transform: rotate(90deg); margin: 2px 0; font-size: 18px; }
  .download-btn { width: 100%; max-width: 200px; height: 44px; margin: 20px auto 0; }
  .footer { flex-direction: column; gap: 10px; justify-content: center; height: auto; padding: 20px var(--margin); margin-top: 60px; }
  .footer-copy { font-size: 12px; text-align: center; }
  .footer-links { font-size: 12px; gap: 12px; flex-wrap: wrap; justify-content: center; }
}

@media (max-width: 400px) {
  :root { --margin: 16px; --header-h: 54px; --radius: 14px; --radius-sm: 10px; }
  .ambient-glow { height: 200px; opacity: 0.4; }
  .hero { padding: 50px var(--margin) 0; }
  .hero h1 { font-size: 26px; }
  .hero h2 { font-size: 21px; }
  .hero p { font-size: 13px; }
  .content-row { padding-top: 24px; gap: 18px; }
  .upload-card { padding: 28px 16px 24px; }
  .upload-icon-circle { width: 42px; height: 42px; }
  .upload-btn { height: 44px; font-size: 14px; max-width: 100%; }
  .image-box { height: 160px; }
  .preview-card { padding: 16px 12px; }
  .download-btn { height: 42px; font-size: 14px; max-width: 100%; }
  .footer { padding: 16px var(--margin); margin-top: 40px; }
  .footer-links { font-size: 11px; gap: 8px; }
}

@media (hover: none) and (pointer: coarse) {
  .upload-btn, .download-btn, .header-cta { min-height: 44px; }
}
</style>

<body>

<div class="ambient-glow"></div>

<header class="header">

<main class="main">
  <section class="hero">

    <p>BRIA RMBG-2.0 模型，能区分白色物体与白色背景，边缘处理远超 ISNet。</p>
  </section>

  <div class="content-row">
    <div class="upload-card" id="uploadCard">
      <div class="upload-icon-circle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"></line>
          <polyline points="5 12 12 5 19 12"></polyline>
        </svg>
      </div>
      <div class="upload-text">拖拽图片到此处，或点击上传</div>
      <div class="upload-hint">支持 PNG / JPG / WebP，最大 10MB</div>
      <button class="upload-btn" id="uploadBtn">加载模型中...</button>

      <div class="preview-label">预览</div>

        <div class="image-box" id="beforeBox">

          <span class="image-tag after">处理后</span>
          <span class="image-placeholder">✨</span>
          <img id="afterImg" src="" alt="" style="display:none">

  <footer class="footer">

</main>

<script type="module">
const uploadBtn = document.getElementById('uploadBtn');
const statusText = document.getElementById('statusText');
const fileInput = document.getElementById('fileInput');
const beforeBox = document.getElementById('beforeBox');
const beforeImg = document.getElementById('beforeImg');
const beforePh = beforeBox.querySelector('.image-placeholder');
const afterBox = document.getElementById('afterBox');
const afterImg = document.getElementById('afterImg');
const afterPh = afterBox.querySelector('.image-placeholder');
const downloadBtn = document.getElementById('downloadBtn');
const statusSpan = beforeBox.querySelector('.processing-indicator span');

let ort = null;
let modelSession = null;
let originalFile = null;
let resultBlob = null;

const WASM_BASE = 'https://kk18929816631-code.github.io/bg-remover/models/';
const MODEL_BASE = './models/';

function setStatus(msg) { statusText.textContent = msg; }

async function loadChunkedModel(resourcesUrl) {
  setStatus('正在获取模型索引...');
  const resp = await fetch(resourcesUrl);
  if (!resp.ok) throw new Error('模型索引加载失败');
  const resources = await resp.json();
  const modelEntry = resources['model_fp16.onnx'];
  if (!modelEntry) throw new Error('模型索引无效');

  const hashes = modelEntry.hashes;
  const totalChunks = hashes.length;
  setStatus('正在下载模型 (' + totalChunks + ' 块)...');

  const CONCURRENCY = 6;
  const chunkData = new Array(totalChunks);
  let downloaded = 0;

  async function downloadChunk(idx) {
    const url = MODEL_BASE + hashes[idx];
    let resp = await fetch(url);
    if (!resp.ok) throw new Error('分块下载失败');
    const buf = await resp.arrayBuffer();
    chunkData[idx] = new Uint8Array(buf);
    downloaded++;
    const pct = Math.round(downloaded / totalChunks * 100);
    setStatus('正在下载模型... ' + pct + '%');
  }

  for (let i = 0; i < totalChunks; i += CONCURRENCY) {
    const batch = [];
    for (let j = i; j < Math.min(i + CONCURRENCY, totalChunks); j++) {
      batch.push(downloadChunk(j));
    }
    await Promise.all(batch);
  }

  setStatus('正在组装模型文件...');
  const totalSize = chunkData.reduce((s, c) => s + c.length, 0);
  const modelBuffer = new Uint8Array(totalSize);
  let pos = 0;
  for (const chunk of chunkData) {
    modelBuffer.set(chunk, pos);
    pos += chunk.length;
  }
  return modelBuffer.buffer;
}

async function loadModel() {
  setStatus('正在加载 ONNX Runtime...');

  const IMPORT_TIMEOUT = 20000;
  async function tryImport(url, timeout) {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), timeout);
    try { const mod = await import(url); clearTimeout(timer); return mod; }
    catch(e) { clearTimeout(timer); throw e; }
  }

  const sources = [
    'https://esm.sh/onnxruntime-web@1.20.1',
    'https://cdn.jsdelivr.net/npm/onnxruntime-web@1.20.1/dist/+esm',
  ];

  let loaded = false;
  for (const src of sources) {
    try { const mod = await tryImport(src, IMPORT_TIMEOUT); ort = mod.default || mod; loaded = true; break; }
    catch(e) { console.warn('ORT import failed:', src, e.message); }
  }
  if (!loaded) throw new Error('ONNX Runtime 加载失败，请刷新重试');

  if (ort.env?.wasm) {
    ort.env.wasm.wasmPaths = WASM_BASE;
    ort.env.wasm.numThreads = Math.max(1, (navigator.hardwareConcurrency || 4) - 1);
  }

  setStatus('正在加载 RMBG-2.0 模型 (约 430MB)...');
  const buffer = await loadChunkedModel(MODEL_BASE + 'resources.json');

  setStatus('正在初始化模型 (可能需要 1-2 分钟)...');
  modelSession = await ort.InferenceSession.create(buffer, {
    executionProviders: ['wasm'],
    graphOptimizationLevel: 'all',
  });

  setStatus('模型就绪，可以上传图片了');
  uploadBtn.textContent = '选择图片';
  uploadBtn.disabled = false;
}

function preprocess(img) {
  const SIZE = 1024;
  const c = document.createElement('canvas');
  c.width = SIZE; c.height = SIZE;
  const ctx = c.getContext('2d');
  ctx.drawImage(img, 0, 0, SIZE, SIZE);
  const imageData = ctx.getImageData(0, 0, SIZE, SIZE);
  const data = imageData.data;

  const input = new Float32Array(3 * SIZE * SIZE);
  for (let i = 0; i < SIZE * SIZE; i++) {
    input[i] = data[i * 4] / 255;
    input[i + SIZE * SIZE] = data[i * 4 + 1] / 255;
    input[i + 2 * SIZE * SIZE] = data[i * 4 + 2] / 255;
  }
  return { input, origW: img.naturalWidth, origH: img.naturalHeight };
}

function float32ToFloat16(f32) {
  const f16 = new Uint16Array(f32.length);
  const buf = new ArrayBuffer(4);
  const f32view = new Float32Array(buf);
  const u32view = new Uint32Array(buf);
  for (let i = 0; i < f32.length; i++) {
    f32view[0] = f32[i];
    const x = u32view[0];
    const sign = (x >> 16) & 0x8000;
    const exp = ((x >> 23) & 0xff) - 112;
    const frac = (x >> 13) & 0x3ff;
    if (exp <= 0) { f16[i] = sign; }
    else if (exp >= 31) { f16[i] = sign | 0x7c00; }
    else { f16[i] = sign | (exp << 10) | frac; }
  }
  return f16;
}

async function removeBackground(file) {
  if (!modelSession) { alert('模型尚未加载完成'); return; }
  beforeBox.classList.add('processing');
  statusSpan.textContent = 'AI 处理中...';

  try {
    const img = new Image();
    const url = URL.createObjectURL(file);
    await new Promise((r, reject) => { img.onload = r; img.onerror = reject; img.src = url; });
    URL.revokeObjectURL(url);

    const { input, origW, origH } = preprocess(img);
    const f16Data = float32ToFloat16(input);
    const inputTensor = new ort.Tensor('float16', f16Data, [1, 3, 1024, 1024]);
    const results = await modelSession.run({ input: inputTensor });
    const output = results.output;

    // Convert float16 output to float32 + sigmoid
    const outF16 = new Uint16Array(output.data.buffer, output.data.byteOffset, output.data.byteLength / 2);
    const outF32 = new Float32Array(1024 * 1024);
    for (let i = 0; i < 1024 * 1024; i++) {
      const h = outF16[i];
      const sign = (h & 0x8000) ? -1 : 1;
      const exp = (h >> 10) & 0x1f;
      const frac = h & 0x3ff;
      let val;
      if (exp === 0) { val = sign * Math.pow(2, -14) * (frac / 1024); }
      else if (exp === 31) { val = frac ? NaN : sign * Infinity; }
      else { val = sign * Math.pow(2, exp - 15) * (1 + frac / 1024); }
      outF32[i] = 1.0 / (1.0 + Math.exp(-val));
    }

    // Create mask
    const maskCanvas = document.createElement('canvas');
    maskCanvas.width = 1024; maskCanvas.height = 1024;
    const maskCtx = maskCanvas.getContext('2d');
    const maskData = maskCtx.createImageData(1024, 1024);
    for (let i = 0; i < 1024 * 1024; i++) {
      maskData.data[i * 4 + 3] = Math.round(Math.min(1, Math.max(0, outF32[i])) * 255);
    }
    maskCtx.putImageData(maskData, 0, 0);

    // Composite at original resolution
    const outCanvas = document.createElement('canvas');
    outCanvas.width = origW; outCanvas.height = origH;
    const outCtx = outCanvas.getContext('2d');
    outCtx.drawImage(img, 0, 0, origW, origH);
    const outImageData = outCtx.getImageData(0, 0, origW, origH);

    const scaleCanvas = document.createElement('canvas');
    scaleCanvas.width = origW; scaleCanvas.height = origH;
    const scaleCtx = scaleCanvas.getContext('2d');
    scaleCtx.drawImage(maskCanvas, 0, 0, origW, origH);
    const scaledMask = scaleCtx.getImageData(0, 0, origW, origH);

    for (let i = 0; i < origW * origH; i++) {
      outImageData.data[i * 4 + 3] = scaledMask.data[i * 4 + 3];
    }
    outCtx.putImageData(outImageData, 0, 0);

    resultBlob = await new Promise(r => outCanvas.toBlob(r, 'image/png'));
    const resultUrl = URL.createObjectURL(resultBlob);
    afterImg.src = resultUrl; afterImg.style.display = 'block';
    afterPh.style.display = 'none'; downloadBtn.disabled = false;
  } catch (e) {
    console.error('Inference failed:', e);
    alert('抠图失败：' + e.message);
    afterPh.style.display = 'block'; afterImg.style.display = 'none';
  } finally {
    beforeBox.classList.remove('processing');
  }
}

// File handling
function handleFile(file) {
  if (!file) return;
  if (!/^image/(png|jpeg|webp)$/.test(file.type)) {
    alert('请上传 PNG、JPG 或 WebP 格式的图片');
    return;
  }
  if (file.size > 10 * 1024 * 1024) {
    alert('图片大小不能超过 10MB');
    return;
  }

  originalFile = file;
  const url = URL.createObjectURL(file);
  beforeImg.src = url;
  beforeImg.style.display = 'block';
  beforePh.style.display = 'none';
  afterImg.style.display = 'none';
  afterPh.style.display = 'block';
  downloadBtn.disabled = true;

  removeBackground(file);
}

// Upload triggers
uploadBtn.addEventListener('click', () => {
  if (!modelSession) { location.reload(); return; }
  fileInput.click();
});
fileInput.addEventListener('change', (e) => {
  handleFile(e.target.files[0]);
  fileInput.value = '';
});

// Drag & drop
const uploadCard = document.getElementById('uploadCard');
uploadCard.addEventListener('dragover', (e) => { e.preventDefault(); uploadCard.classList.add('drag-over'); });
uploadCard.addEventListener('dragleave', () => uploadCard.classList.remove('drag-over'));
uploadCard.addEventListener('drop', (e) => {
  e.preventDefault();
  uploadCard.classList.remove('drag-over');
  handleFile(e.dataTransfer.files[0]);
});
document.body.addEventListener('dragover', (e) => e.preventDefault());
document.body.addEventListener('drop', (e) => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

// Download
downloadBtn.addEventListener('click', () => {
  if (!resultBlob) return;
  const url = URL.createObjectURL(resultBlob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (originalFile?.name || 'image').replace(/.[^.]+$/, '') + '_nobg.png';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

// Boot
loadModel().catch(e => {
  setStatus('模型加载失败，请刷新重试');
  uploadBtn.textContent = '加载失败，点此重试';
  uploadBtn.disabled = false;
  console.error(e);
});
</script>
</body>
</html>
